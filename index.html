<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal DocFest | Mapa Interactivo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="toast-container"></div>

    <div class="app-container">
        
        <div id="intro-screen" class="screen intro-layer active">
            <button class="skip-btn" onclick="startApp()">SALTAR INTRO ➔</button>
            <img src="Nepal-gif.gif" class="intro-gif" alt="Intro Animation">
        </div>

        <div id="map-screen" class="screen map-layer">
            <div class="top-bar">
                <div class="user-info" onclick="toggleLoginModal()">
                    👤 <span id="user-name-text">Invitado (Click Login)</span>
                </div>
                <div class="current-loc" onclick="openLocationSelector()">
                    📍 <span id="display-user-loc">Sin ubicación</span>
                </div>
            </div>

            <div class="map-full-container">
                <img src="Nepal-Map-ToPrint.png" id="main-map-img" class="map-img-fit" alt="Nepal Map">

                <div id="activities-layer">
                    <div class="marker-group" style="top: 32.5%; left: 8.6%;">
                        <button class="box orange-big" onclick="openExpert('Amor Children\'s Home', '#e67e22')">Amor Children's Home</button>
                        <div class="pointer"></div>
                    </div>
                    <div class="marker-group" style="top: 55.4%; left: 66.8%;">
                        <button class="box orange-big" onclick="openExpert('Amics del Nepal', '#e67e22')">Amics del Nepal Activity Center</button>
                        <div class="pointer"></div>
                    </div>
                    <div class="marker-group" style="top: 83.5%; left: 85.6%;">
                        <button class="box orange-big" onclick="openExpert('Purwanchal Bal Sewa', '#e67e22')">Purwanchal Bal Sewa Ashram</button>
                        <div class="pointer"></div>
                    </div>
                </div>

                <div id="experts-layer">
                    <div class="marker-group" style="top: 19.3%; left: 14.3%;"><button class="box red" onclick="openExpert('Language Expert', '#e74c3c')">Language Expert</button><div class="pointer"></div></div>
                    <div class="marker-group" style="top: 21.6%; left: 24.6%;"><button class="box red" onclick="openExpert('Biodiversity Expert', '#e74c3c')">Biodiversity Expert</button><div class="pointer"></div></div>
                    <div class="marker-group" style="top: 58.6%; left: 35.5%;"><button class="box red" onclick="openExpert('Culture Expert', '#e74c3c')">Culture Expert</button><div class="pointer"></div></div>
                    <div class="marker-group" style="top: 48.2%; left: 47.7%;"><button class="box red" onclick="openExpert('Food Expert', '#e67e22')">Food Expert</button><div class="pointer"></div></div>
                    <div class="marker-group" style="top: 74.4%; left: 63.8%;"><button class="box red" onclick="openExpert('Festivals Expert', '#e74c3c')">Festivals Expert</button><div class="pointer"></div></div>
                    <div class="marker-group" style="top: 80.5%; left: 70.4%;"><button class="box red" onclick="openExpert('Economy Expert', '#e74c3c')">Economy Expert</button><div class="pointer"></div></div>
                    <div class="marker-group" style="top: 61.2%; left: 80.4%;"><button class="box red" onclick="openExpert('Geography Expert', '#e74c3c')">Geography Expert</button><div class="pointer"></div></div>
                </div>

                <div class="bottom-nav">
                    <button class="nav-btn" onclick="changeMap('political', event)">POLITICAL MAP</button>
                    <button class="nav-btn" onclick="changeMap('physical', event)">PHYSICAL MAP</button>
                    <button class="nav-btn" onclick="changeMap('teams', event)">TEAMS (Experts)</button>
                    <button class="nav-btn active" onclick="changeMap('activities', event)">ACTIVITIES (Homes)</button>
                </div>
            </div>
        </div>

        <div id="expert-screen" class="screen expert-layer next">
            <header id="dynamic-header">
                <div class="header-titles">
                    <h1 id="expert-title">CONTENIDO</h1>
                    <p>SCHOOL DOCFEST | Nepal Expedition</p>
                </div>
                <button class="close-content-btn" onclick="closeExpert()">✕ CERRAR</button>
            </header>
            <main class="video-grid">
                <div class="video-card">
                    <div class="video-wrapper"><iframe id="video-1" src=""></iframe></div>
                    <h3>Documental</h3>
                </div>
                <div class="video-card highlight">
                    <div class="video-wrapper"><iframe id="video-2" src=""></iframe></div>
                    <h3>Entrevista Principal</h3>
                </div>
                <div class="video-card">
                    <div class="video-wrapper"><iframe id="video-3" src=""></iframe></div>
                    <h3>Behind the Scenes</h3>
                </div>
            </main>
        </div>
    </div>

    <div id="login-modal" class="overlay">
        <div class="popup">
            <h2>Login</h2>
            <input type="text" id="username" placeholder="Usuario">
            <input type="password" id="password" placeholder="Contraseña">
            <button class="auth-btn" onclick="handleAuth()">ENTRAR</button>
            <button class="close-btn-simple" onclick="toggleLoginModal()">CERRAR</button>
        </div>
    </div>

    <div id="loc-modal" class="overlay">
        <div class="popup">
            <h3>Selecciona tu centro</h3>
            <div class="loc-options">
                <button onclick="setUserLocation('Amor Children\'s Home')">Amor Children's Home</button>
                <button onclick="setUserLocation('Amics del Nepal')">Amics del Nepal</button>
                <button onclick="setUserLocation('Purwanchal Bal Sewa')">Purwanchal Bal Sewa</button>
            </div>
            <button class="close-btn-simple" onclick="closeLocationSelector()">CERRAR</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
