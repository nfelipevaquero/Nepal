<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nepal DocFest | Interactive Map</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div id="toast-container"></div>
    <div id="ripple-host"></div>

    <div class="app-container">

        <div id="intro-screen" class="screen intro-layer active">
            <button class="skip-btn" onclick="startApp()">SKIP INTRO ➔</button>
            <div class="map-stage-wrap">
                <div class="map-stage intro-stage">
                    <img src="Nepal-gif.gif" class="stage-media" alt="Intro Animation">
                    <div class="intro-overlay"></div>
                    <div class="intro-title">
                        <p>School DocFest · Nepal Expedition</p>
                        <h1>Discover <span class="accent">Nepal</span></h1>
                    </div>
                </div>
            </div>
        </div>

        <div id="map-screen" class="screen map-layer">
            <div class="top-bar">
                <div class="user-info" onclick="handleUserClick()">
                    <span class="user-icon">👤</span>
                    <span id="user-name-text">Guest (Click to Login)</span>
                </div>
                <div class="current-loc" onclick="openLocationSelector()">
                    📍 <span id="display-user-loc">No location</span>
                </div>
            </div>

            <div class="map-stage-wrap">
                <div class="map-stage">
                    <img src="Nepal-Map-ToPrint.png" id="main-map-img" class="stage-media" alt="Nepal Map">

                    <div id="activities-layer" class="overlay-layer">
                        <div class="marker-group" style="top: 33%; left: 5%;">
                            <button class="box orange-big" onclick="openExpert('Amor Children\'s Home', '#e8773c')">Amor Children's Home</button>
                            <div class="pointer"></div>
                        </div>
                        <div class="marker-group" style="top: 56%; left: 58%;">
                            <button class="box orange-big" onclick="openExpert('Amics del Nepal', '#e8773c')">Amics del Nepal</button>
                            <div class="pointer"></div>
                        </div>
                        <div class="marker-group" style="top: 88%; left: 92%;">
                            <button class="box orange-big" onclick="openExpert('Purwanchal Bal Sewa', '#e8773c')">Purwanchal Bal Sewa</button>
                            <div class="pointer"></div>
                        </div>
                    </div>

                    <div id="experts-layer" class="overlay-layer">
                        <div class="marker-group" style="top: 12%; left: 12%;">
                            <button class="box red" onclick="openExpert('Language Expert', '#c8434d')">Language Expert</button>
                            <div class="pointer"></div>
                        </div>
                        <div class="marker-group" style="top: 14%; left: 24%;">
                            <button class="box red" onclick="openExpert('Biodiversity Expert', '#c8434d')">Biodiversity Expert</button>
                            <div class="pointer"></div>
                        </div>
                        <div class="marker-group" style="top: 65%; left: 30%;">
                            <button class="box red" onclick="openExpert('Culture Expert', '#c8434d')">Culture Expert</button>
                            <div class="pointer"></div>
                        </div>
                        <div class="marker-group" style="top: 48%; left: 44%;">
                            <button class="box red" onclick="openExpert('Food Expert', '#c8434d')">Food Expert</button>
                            <div class="pointer"></div>
                        </div>
                        <div class="marker-group" style="top: 70%; left: 53%;">
                            <button class="box red" onclick="openExpert('Festivals Expert', '#c8434d')">Festivals Expert</button>
                            <div class="pointer"></div>
                        </div>
                        <div class="marker-group" style="top: 80%; left: 63%;">
                            <button class="box red" onclick="openExpert('Economy Expert', '#c8434d')">Economy Expert</button>
                            <div class="pointer"></div>
                        </div>
                        <div class="marker-group" style="top: 60%; left: 76%;">
                            <button class="box red" onclick="openExpert('Geography Expert', '#c8434d')">Geography Expert</button>
                            <div class="pointer"></div>
                        </div>
                    </div>

                    <div id="schools-layer" class="overlay-layer"></div>
                </div>
            </div>

            <div class="bottom-nav">
                <button class="nav-btn" data-mode="political" onclick="changeMap('political', event)">POLITICAL MAP</button>
                <button class="nav-btn" data-mode="physical" onclick="changeMap('physical', event)">PHYSICAL MAP</button>
                <button class="nav-btn" data-mode="teams" onclick="changeMap('teams', event)">TEAMS</button>
                <button class="nav-btn active" data-mode="activities" onclick="changeMap('activities', event)">ACTIVITIES</button>
            </div>
        </div>

        <div id="expert-screen" class="screen expert-layer next">
            <header id="dynamic-header">
                <div class="header-titles">
                    <h1 id="expert-title">CONTENT</h1>
                    <p>SCHOOL DOCFEST · Nepal Expedition</p>
                </div>
                <button class="close-content-btn" onclick="closeExpert()">✕ CLOSE</button>
            </header>
            <main class="video-grid">
                <div class="video-card">
                    <div class="video-wrapper"><iframe id="video-1" src=""></iframe></div>
                    <h3>Documentary</h3>
                </div>
                <div class="video-card">
                    <div class="video-wrapper"><iframe id="video-2" src=""></iframe></div>
                    <h3>Main Interview</h3>
                </div>
                <div class="video-card">
                    <div class="video-wrapper"><iframe id="video-3" src=""></iframe></div>
                    <h3>Behind the Scenes</h3>
                </div>
            </main>
        </div>
    </div>

    <div id="login-modal" class="overlay">
        <div class="popup">
            <h2>Login</h2>
            <input type="text" id="username" placeholder="Username" autocomplete="off">
            <input type="password" id="password" placeholder="Password">
            <button class="auth-btn" onclick="handleAuth()">ENTER</button>
            <button class="close-btn-simple" onclick="toggleLoginModal()">CLOSE</button>
        </div>
    </div>

    <div id="loc-modal" class="overlay">
        <div class="popup">
            <h3>Select your center</h3>
            <div class="loc-options">
                <button onclick="setUserLocation('Amor Children\'s Home')">Amor Children's Home</button>
                <button onclick="setUserLocation('Amics del Nepal')">Amics del Nepal</button>
                <button onclick="setUserLocation('Purwanchal Bal Sewa')">Purwanchal Bal Sewa</button>
            </div>
            <button class="close-btn-simple" onclick="closeLocationSelector()">CLOSE</button>
        </div>
    </div>

    <div id="user-menu" class="overlay">
        <div class="popup">
            <h3 id="user-menu-title">Your Session</h3>
            <p id="user-menu-info" class="user-menu-info">—</p>
            <button class="auth-btn" onclick="openLocationSelector(); closeUserMenu();">CHANGE CENTER</button>
            <button class="auth-btn logout" onclick="logout()">LOG OUT</button>
            <button class="close-btn-simple" onclick="closeUserMenu()">CLOSE</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
