<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nepal School DocFest</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #f4f7f6; /* Fondo moderno claro */
            overflow: hidden; display: flex; justify-content: center; align-items: center; 
        }
        
        #game-container { 
            /* Esto mantiene el DOM (vídeos) pegado al canvas de Phaser */
            position: relative; 
            width: 100vw; height: 100vh;
        }

        /* Estilo moderno y redondo para los vídeos */
        iframe {
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            /* Evitamos que el navegador añada márgenes */
            border: none;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="game-container"></div>
    <script src="src/data.js"></script>
    <script src="src/scenes/BootScene.js"></script>
    <script src="src/scenes/MapScene.js"></script>
    <script src="src/scenes/ExpertScene.js"></script>
    <script src="src/scenes/QuizScene.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
